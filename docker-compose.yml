# ============================================================
# PhishGuard – docker-compose.yml
# ============================================================
# Run locally:
#   docker-compose up --build
#
# Frontend:  http://localhost:3000
# Backend:   http://localhost:8000
# API docs:  http://localhost:8000/docs
#
# NOTE: The trained model (models/stacking_pipeline.joblib) must
# exist before starting. Run training first:
#   python backend/train.py
# ============================================================

version: "3.9"

services:

  # ──────────────────────────────────────────────────────────
  # Backend (FastAPI + ML inference)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishguard-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount the trained model directory so it persists outside the container
      - ./backend/models:/app/models:ro
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # Frontend (React + nginx)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tell Vite to call the backend via the host-level port 8000.
        # In a real deployment this would be your backend's domain/IP.
        VITE_API_URL: http://localhost:8000
    container_name: phishguard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: phishguard-net

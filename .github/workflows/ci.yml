# ============================================================
# PhishGuard – GitHub Actions CI
# ============================================================
# Triggers: push or pull-request on any branch.
#
# Jobs:
#   1. backend-lint-test  – flake8 + pytest (unit + integration)
#   2. frontend-test      – npm ci + vitest
#   3. docker-build       – build both Docker images (no push)
#
# To enable Docker image push to a registry, uncomment the
# "Push images" step and configure the appropriate secrets:
#   REGISTRY_USERNAME, REGISTRY_PASSWORD, REGISTRY_HOST
# ============================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────
  # 1. Backend: lint + unit tests
  # ────────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: backend
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (don't fail)
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=100 --statistics

      - name: Run pytest (unit tests only – no model required)
        working-directory: backend
        run: |
          pytest tests/test_preprocessing.py -v --tb=short

      - name: Run API integration tests (with mocked model)
        working-directory: backend
        run: |
          pytest tests/test_api.py -v --tb=short

  # ────────────────────────────────────────────────────────
  # 2. Frontend: lint + vitest
  # ────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend – Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true # warn but don't fail CI on style issues

      - name: Run Vitest (unit tests)
        working-directory: frontend
        run: npm test

      - name: Build frontend (production)
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ────────────────────────────────────────────────────────
  # 3. Docker: build images (no push in open PRs)
  # ────────────────────────────────────────────────────────
  docker-build:
    name: Docker – Build Images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: phishguard-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: phishguard-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Uncomment to push images to a registry ──────────

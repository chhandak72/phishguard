# render.yaml
# -----------
# Render Blueprint for PhishGuard backend.
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: phishguard-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && chmod +x render_startup.sh
    startCommand: bash render_startup.sh
    envVars:
      - key: CORS_ORIGINS
        # Update this to your frontend URL after deployment if needed
        value: https://phishguard-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: model-storage
      mountPath: /opt/render/project/src/models
      sizeGB: 1

  - type: static
    name: phishguard-frontend
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm --prefix frontend run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        # During Render setup replace this with the backend's public URL that Render provides
        value: https://phishguard-backend.onrender.com
